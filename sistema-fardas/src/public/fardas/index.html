<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRUD de Fardas</title>
    <link rel="stylesheet" href="/fardas/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Cadastro de Fardas</h1>

      <div class="formulario">
        <input type="hidden" id="indice" />

        <label>Camisa</label>
        <input type="text" id="camisa" />

        <label>Short</label>
        <input type="text" id="short" />

        <label>Tamanho</label>
        <select id="tamanho">
          <option value="P">P</option>
          <option value="M">M</option>
          <option value="G">G</option>
          <option value="GG">GG</option>
        </select>

        <label>Quantidade</label>
        <input type="number" id="quantidade" />

        <label>Registro de Entrega</label>
        <input type="date" id="entrega" />

        <button onclick="salvar()">Salvar</button>
      </div>

      <hr />

      <table>
        <thead>
          <tr>
            <th>Camisa</th>
            <th>Short</th>
            <th>Tamanho</th>
            <th>Quantidade</th>
            <th>Entrega</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="lista"></tbody>
      </table>
    </div>

    <script src="/fardas/ap.js"></script>
  </body>
</html>
